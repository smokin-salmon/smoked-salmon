name: Create and publish Docker images

on:
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Ensures we get all history for tag retrieval and pushing
          token: ${{ secrets.BUMP_VERSION_TOKEN_ACTION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Get lowercase repo name
        id: get_lowercase_repo_name
        run: |
          REPO_NAME=${{ env.IMAGE_NAME }} 
          echo "LOWER_CASE_REPO_NAME=${REPO_NAME,,}" >> $GITHUB_ENV

      - name: Get release version
        run: |
          RELEASE_VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$RELEASE_VERSION" ]; then
            echo "Error: RELEASE_VERSION is empty. Ensure a valid release tag."
            exit 1
          fi
          echo "VERSION=${RELEASE_VERSION}" >> $GITHUB_ENV

      - name: Get release notes
        run: |
          {
            echo "RELEASE_NOTES<<EOF"
            echo "$RELEASE_NOTES"
            echo "EOF"
          } >> $GITHUB_ENV
        env:
          RELEASE_NOTES: ${{ github.event.release.body }}

      - name: Update version files
        run: |
          PYPROJECT_FILE="pyproject.toml"

          # Prepend new changelog entry and update current version
          uv run --with tomlkit python -c $'import os, tomlkit\n\nfrom datetime import date\n\nversion = os.environ["VERSION"]\nrelease_date = date.today().strftime("%Y-%m-%d")\nnotes = os.environ["RELEASE_NOTES"]\npath = "src/salmon/data/version.toml"\n\nwith open(path, "r", encoding="utf-8") as f:\n    data = tomlkit.load(f)\n\ndata["current"] = version\n\nentry = tomlkit.table()\nentry.add("version", version)\nentry.add("date", release_date)\nentry.add("notes", tomlkit.string("\\n" + notes + "\\n", multiline=True))\nentry.add(tomlkit.nl())\n\ndata["changelog"].insert(0, entry)\n\nwith open(path, "w", encoding="utf-8") as f:\n    tomlkit.dump(data, f)\n'

          # Update version in pyproject.toml
          sed -i "s/^version = \".*\"/version = \"${{ env.VERSION }}\"/" "$PYPROJECT_FILE"

          # Regenerate uv.lock to update the package version
          uv lock
        env:
          RELEASE_NOTES: ${{ env.RELEASE_NOTES }}

      - name: Commit and push version update
        run: |
          git checkout master
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/salmon/data/version.toml pyproject.toml uv.lock
          git commit -m "Update version.toml/pyproject.toml to ${{ env.VERSION }} with changelog"
          git push origin master

      - name: Move tag to version bump commit and push
        run: |
          git tag -f ${{ env.VERSION }}
          git push origin "refs/tags/${{ env.VERSION }}" --force

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.LOWER_CASE_REPO_NAME }}:${{ env.VERSION }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
