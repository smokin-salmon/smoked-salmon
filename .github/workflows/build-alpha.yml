name: Build Alpha Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-alpha-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=alpha
            type=sha,prefix=alpha-

      - name: Build and push alpha Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Move alpha tag to current commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa alpha -m "Alpha pre-release for ${GITHUB_SHA}"
          git push origin refs/tags/alpha --force

      - name: Create or update alpha GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPOSITORY"]
          sha = os.environ["SHA"]
          short_sha = sha[:7]
          api_base = f"https://api.github.com/repos/{repo}"
          body = "\n".join(
              [
                  f"Rolling pre-release from `master` at commit `{short_sha}`.",
                  "",
                  "Docker images:",
                  f"- `ghcr.io/{repo.lower()}:alpha`",
                  f"- `ghcr.io/{repo.lower()}:alpha-{short_sha}`",
                  "",
                  "This pre-release is automatically updated on each push to `master` and can also be refreshed manually with the `Build Alpha Image` workflow.",
              ]
          )

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          payload = {
              "tag_name": "alpha",
              "target_commitish": sha,
              "name": "Alpha pre-release",
              "body": body,
              "draft": False,
              "prerelease": True,
          }

          def request(url, method="GET", data=None):
              raw = json.dumps(data).encode("utf-8") if data is not None else None
              req = urllib.request.Request(url, data=raw, method=method)
              for key, value in headers.items():
                  req.add_header(key, value)
              if raw is not None:
                  req.add_header("Content-Type", "application/json")
              with urllib.request.urlopen(req) as response:
                  return json.load(response)

          try:
              existing = request(f"{api_base}/releases/tags/alpha")
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              request(f"{api_base}/releases", method="POST", data=payload)
          else:
              request(f"{api_base}/releases/{existing['id']}", method="PATCH", data=payload)
          PY
